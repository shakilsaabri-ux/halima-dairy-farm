<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALIMA DAIRY FARM - Master Interactive Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --glass-card: rgba(30, 30, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #e2b857;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --modal-bg: #1e1e1e;
        }

        body.light-theme {
            --bg-dark: #f1f5f9;
            --glass-card: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: rgba(148, 163, 184, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-gold: #b88e2f;
            --modal-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 14px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        .header-inline {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-inline h1 {
            font-size: 1.25rem;
            font-weight: 900;
            margin: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .metric-card {
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 4px 20px var(--glass-shadow);
            border-left: 4px solid var(--accent-gold);
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: transform 0.1s ease;
        }
        .metric-card:active { transform: scale(0.97); }
        .metric-card.green-bar { border-left-color: var(--accent-green); }
        .metric-card.blue-bar { border-left-color: var(--accent-blue); }
        .metric-card.red-bar { border-left-color: var(--accent-red); }

        .metric-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 900;
        }

        .card-box {
            background: var(--glass-card);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px var(--glass-shadow);
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 8px;
        }
        body.light-theme .section-title { border-bottom: 1px solid rgba(0,0,0,0.06); }

        label {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .form-control, .form-select {
            min-height: 44px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            background: rgba(20, 20, 20, 0.2);
            color: var(--text-primary);
        }
        body.light-theme .form-control, body.light-theme .form-select { background: #f8fafc; }

        .action-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .action-btn {
            min-height: 46px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            color: white;
            transition: transform 0.1s ease;
        }
        .action-btn:active { transform: scale(0.97); }
        .btn-gone { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .btn-came { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
        .btn-kori { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }

        .clickable-row {
            cursor: pointer;
            transition: background 0.1s ease;
        }
        .clickable-row:active { background: rgba(255, 255, 255, 0.05); }

        .table th {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--glass-border);
        }
        .table td {
            font-size: 12px;
            padding: 12px 8px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .interval-tab-box {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .int-tab {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-weight: 800;
            font-size: 11px;
            padding: 10px;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .int-tab.active { background: var(--accent-gold); color: #121212 !important; }

        .ct-touch-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .ct-touch-box:active { transform: scale(0.96); }

        .custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .custom-modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: var(--text-primary);
        }
        .modal-item-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--glass-border);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0" style="max-width: 650px; margin: 0 auto;">

    <div class="header-inline">
        <div>
            <h1 style="color: var(--text-primary);">HALIMA DAIRY FARM</h1>
            <small style="font-size: 10px; font-weight:800; color: var(--text-secondary); text-transform:uppercase;">Master Interactive Reports</small>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-secondary" style="font-size:11px; font-weight:800;" onclick="toggleThemeSkin()">🌓 THEME CHANGE</button>
            <div class="bg-warning text-dark px-2 py-1 rounded fw-bold" style="font-size:11px;">2026</div>
        </div>
    </div>

    <div class="interval-tab-box">
        <button id="tab-daily" class="int-tab active" onclick="switchInterval('daily')">Daily</button>
        <button id="tab-weekly" class="int-tab" onclick="switchInterval('weekly')">Weekly</button>
        <button id="tab-monthly" class="int-tab" onclick="switchInterval('monthly')">Monthly</button>
        <button id="tab-yearly" class="int-tab" onclick="switchInterval('yearly')">Yearly</button>
    </div>

    <div class="section-title px-1" style="margin-bottom:8px; color: var(--text-primary);">📊 Master Dashboard Indicators (Touch for Details)</div>
    <div class="dashboard-grid">
        <button class="metric-card blue-bar" onclick="viewMetricDetail('avg_cost_liter')">
            <div class="metric-title">Avg Cost Per Liter 👆</div>
            <div class="metric-value">Rs <span id="lblAvgCostLiter">0.00</span></div>
        </button>
        <button class="metric-card" onclick="viewMetricDetail('slaughtered_count')">
            <div class="metric-title">Slaughtered Animals Count 👆</div>
            <div class="metric-value"><span id="lblSlaughteredCount">0</span> Head</div>
        </button>
        <button class="metric-card" onclick="viewMetricDetail('slaughtered_amount')">
            <div class="metric-title">Slaughtered Total Amount 👆</div>
            <div class="metric-value">Rs <span id="lblSlaughteredAmount">0</span></div>
        </button>
        <button class="metric-card red-bar" onclick="viewMetricDetail('dead_liability')">
            <div class="metric-title">Dead Animal Liability 👆</div>
            <div class="metric-value" style="color: var(--accent-red);">Rs <span id="lblDeadLiability">0</span></div>
        </button>
        <button class="metric-card green-bar" style="grid-column: span 2;" onclick="viewMetricDetail('slaughtered_avg_rate')">
            <div class="metric-title">Slaughtered Avg Rate Per Buffalo 👆</div>
            <div class="metric-value">Rs <span id="lblSlaughteredAvgRate">0.00</span></div>
        </button>
    </div>

    <div class="action-btn-group">
        <button class="action-btn btn-gone" onclick="openTxForm('Bakdi Gone')">Bakdi Gone 📉</button>
        <button class="action-btn btn-came" onclick="openTxForm('Taji Came')">Taji Came 📈</button>
        <button class="action-btn btn-kori" onclick="openTxForm('Kori Purchase')">Kori Fresh 🆕</button>
    </div>

    <div id="txFormContainer" class="card-box" style="display: none; border: 1px solid var(--accent-gold);">
        <div class="section-title text-warning" id="txFormTitle">Log Operational Update</div>
        <div class="row g-2">
            <div class="col-6">
                <label>Animal Tag Number</label>
                <input type="number" id="txTagNo" class="form-control" placeholder="e.g. 1905">
            </div>
            <div class="col-6">
                <label>Valuation Amount (Rs)</label>
                <input type="number" id="txAmount" class="form-control" placeholder="Value in Rs">
            </div>
            <div class="col-6">
                <label>Caretaker Profile</label>
                <select id="txCaretaker" class="form-select">
                    <option value="Noora">Noora</option>
                    <option value="Tosif">Tosif</option>
                    <option value="Irshad">Irshad (Freight)</option>
                </select>
            </div>
            <div class="col-6">
                <label>Status Classification</label>
                <select id="txStatus" class="form-select">
                    <option value="Slaughtered">Slaughtered</option>
                    <option value="Dead">Dead (Auto 80k Parameter)</option>
                    <option value="Active">Active Rearing</option>
                </select>
            </div>
            <div class="col-12 mt-3">
                <button class="btn btn-warning w-100 fw-bold text-dark" onclick="saveOperationalTxEntry()">COMMIT RECORD TO MASTER ENGINE</button>
            </div>
        </div>
    </div>

    <div class="card-box">
        <div class="section-title" style="color: var(--text-primary);">📋 Comprehensive Ledger Records Registry (Touch Row)</div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Tag No</th>
                        <th>Caretaker</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Financials</th>
                    </tr>
                </thead>
                <tbody id="masterLedgerBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card-box">
        <div class="section-title" style="color: var(--text-primary);">🚚 Caretaker Bills & Freight Management</div>
        <div class="row g-2">
            <div class="col-4">
                <button class="ct-touch-box" onclick="viewCaretakerDetail('Noora')">
                    <small class="d-block text-secondary text-uppercase" style="font-size:9px;">Noora Bill 👆</small>
                    <span class="fw-bold text-warning" id="lblNooraBill">Rs 0</span>
                </button>
            </div>
            <div class="col-4">
                <button class="ct-touch-box" onclick="viewCaretakerDetail('Tosif')">
                    <small class="d-block text-secondary text-uppercase" style="font-size:9px;">Tosif Bill 👆</small>
                    <span class="fw-bold text-warning" id="lblTosifBill">Rs 0</span>
                </button>
            </div>
            <div class="col-4">
                <button class="ct-touch-box" onclick="viewCaretakerDetail('Irshad')">
                    <small class="d-block text-secondary text-uppercase" style="font-size:9px;">Irshad Freight 👆</small>
                    <span class="fw-bold text-danger" id="lblIrshadFreight">Rs 0</span>
                </button>
            </div>
        </div>
    </div>

</div>

<div id="detailModal" class="custom-modal" onclick="closeDetailModal()">
    <div class="custom-modal-content" onclick="event.stopPropagation()">
        <h5 id="modalHeading" class="section-title text-warning" style="border-bottom: 1px solid var(--accent-gold); padding-bottom: 10px;">Breakdown Sheet</h5>
        <div id="modalDataContainer" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;">
            </div>
        <button class="btn btn-secondary w-100 fw-bold rounded-3" onclick="closeDetailModal()">DISMISS DETAIL SHEET</button>
    </div>
</div>

<script>
    let currentInterval = 'daily';
    let activeTxType = '';

    let defaultRecords = [
        { tag: "1900", caretaker: "Noora", type: "Bakdi Gone", status: "Slaughtered", amount: 125000, date: "2026-05-23" },
        { tag: "1901", caretaker: "Tosif", type: "Taji Came", status: "Active", amount: 95000, date: "2026-05-23" },
        { tag: "1902", caretaker: "Noora", type: "Bakdi Gone", status: "Dead", amount: 80000, date: "2026-05-22" },
        { tag: "1903", caretaker: "Irshad", type: "Kori Purchase", status: "Active", amount: 111700, date: "2026-05-20" }
    ];

    let records = JSON.parse(localStorage.getItem("halimaMasterRecords")) || defaultRecords;

    document.addEventListener("DOMContentLoaded", () => {
        calculateMasterEngineMetrics();
    });

    function toggleThemeSkin() {
        document.body.classList.toggle("light-theme");
    }

    function switchInterval(interval) {
        currentInterval = interval;
        document.querySelectorAll(".int-tab").forEach(b => b.classList.remove("active"));
        document.getElementById(`tab-${interval}`).classList.add("active");
        calculateMasterEngineMetrics();
    }

    function openTxForm(type) {
        activeTxType = type;
        document.getElementById("txFormContainer").style.display = "block";
        document.getElementById("txFormTitle").innerText = `Log Dynamic Action Entry: ${type}`;
        document.getElementById("txStatus").value = (type === 'Bakdi Gone') ? "Slaughtered" : "Active";
    }

    function saveOperationalTxEntry() {
        let tag = document.getElementById("txTagNo").value || "N/A";
        let amt = parseFloat(document.getElementById("txAmount").value) || 0;
        let caretaker = document.getElementById("txCaretaker").value;
        let status = document.getElementById("txStatus").value;

        if (status === "Dead") amt = 80000;

        let newEntry = {
            tag: tag, caretaker: caretaker, type: activeTxType, status: status, amount: amt,
            date: new Date().toISOString().split('T')[0]
        };

        records.unshift(newEntry);
        localStorage.setItem("halimaMasterRecords", JSON.stringify(records));
        
        document.getElementById("txFormContainer").style.display = "none";
        document.getElementById("txTagNo").value = "";
        document.getElementById("txAmount").value = "";

        calculateMasterEngineMetrics();
    }

    function calculateMasterEngineMetrics() {
        let totalSlaughteredCount = 0;
        let totalSlaughteredValue = 0;
        let totalDeadLiability = 0;
        
        let nooraBillTotal = 0;
        let tosifBillTotal = 0;
        let irshadFreightTotal = 0;

        let tbody = document.getElementById("masterLedgerBody");
        tbody.innerHTML = "";

        records.forEach((r, index) => {
            if (r.status === "Slaughtered") { totalSlaughteredCount++; totalSlaughteredValue += r.amount; }
            if (r.status === "Dead") { totalDeadLiability += 80000; }

            if (r.caretaker === "Noora") nooraBillTotal += r.amount;
            if (r.caretaker === "Tosif") tosifBillTotal += r.amount;
            if (r.caretaker === "Irshad") irshadFreightTotal += r.amount;

            let tr = document.createElement("tr");
            tr.className = "clickable-row";
            tr.setAttribute("onclick", `viewRowDetail(${index})`);
            tr.innerHTML = `
                <td><strong>#${r.tag}</strong></td>
                <td>${r.caretaker}</td>
                <td><span class="badge ${r.type==='Taji Came'?'bg-success':r.type==='Bakdi Gone'?'bg-danger':'bg-primary'}">${r.type}</span></td>
                <td><small class="text-uppercase fw-bold">${r.status}</small></td>
                <td class="text-end fw-bold">Rs ${r.amount.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });

        let avgSlaughteredRate = totalSlaughteredCount > 0 ? (totalSlaughteredValue / totalSlaughteredCount) : 0;
        let computedMockCostPerLiter = totalSlaughteredCount > 0 ? (totalSlaughteredValue / 1430) : 87.40; 

        document.getElementById("lblAvgCostLiter").innerText = computedMockCostPerLiter.toFixed(2);
        document.getElementById("lblSlaughteredCount").innerText = totalSlaughteredCount;
        document.getElementById("lblSlaughteredAmount").innerText = totalSlaughteredValue.toLocaleString();
        document.getElementById("lblDeadLiability").innerText = totalDeadLiability.toLocaleString();
        document.getElementById("lblSlaughteredAvgRate").innerText = avgSlaughteredRate.toFixed(2);

        document.getElementById("lblNooraBill").innerText = "Rs " + nooraBillTotal.toLocaleString();
        document.getElementById("lblTosifBill").innerText = "Rs " + tosifBillTotal.toLocaleString();
        document.getElementById("lblIrshadFreight").innerText = "Rs " + irshadFreightTotal.toLocaleString();
    }

    function showModalBox(heading, htmlContent) {
        document.getElementById("modalHeading").innerText = heading;
        document.getElementById("modalDataContainer").innerHTML = htmlContent;
        document.getElementById("detailModal").style.display = "flex";
    }

    function closeDetailModal() {
        document.getElementById("detailModal").style.display = "none";
    }

    function viewMetricDetail(itemKey) {
        let title = "", bodyContent = "";
        
        if (itemKey === 'avg_cost_liter') {
            title = "Avg Cost Per Liter";
            let currentVal = document.getElementById("lblAvgCostLiter").innerText;
            bodyContent = `
                <div class="modal-item-line"><span>Calculation Method:</span><strong>Auto-balanced Production Logs</strong></div>
                <div class="modal-item-line"><span>Active Filter Scope:</span><strong class="text-uppercase">${currentInterval} Engine</strong></div>
                <div class="p-3 bg-dark text-white rounded-3 mt-3 text-center font-monospace" style="font-size:18px;">Rs ${currentVal} / Litre</div>`;
        }
        else if (itemKey === 'slaughtered_count') {
            title = "Slaughtered Animals Count";
            let count = document.getElementById("lblSlaughteredCount").innerText;
            bodyContent = `
                <div class="modal-item-line"><span>Metric Intent:</span><strong>Trace Outgoing Livestock Count</strong></div>
                <div class="modal-item-line"><span>Data Source Registry:</span><strong>Bakdi Gone (Salvage Book)</strong></div>
                <div class="modal-item-line"><span>Active Range filter:</span><strong class="text-uppercase">${currentInterval}</strong></div>
                <div class="p-3 bg-dark text-white rounded-3 mt-3 text-center font-monospace" style="font-size:18px;">${count} Buffalo Headed</div>`;
        }
        else if (itemKey === 'slaughtered_amount') {
            title = "Slaughtered Total Amount";
            let amt = document.getElementById("lblSlaughteredAmount").innerText;
            bodyContent = `
                <div class="modal-item-line"><span>Data Source:</span><strong>Bakdi Gone (Salvage Book Entries)</strong></div>
                <div class="modal-item-line"><span>Financial Parameter:</span><strong>Sum of Outgoing Settlement Prices</strong></div>
                <div class="p-3 bg-dark text-white rounded-3 mt-3 text-center font-monospace" style="font-size:18px;">Rs ${amt}</div>`;
        }
        else if (itemKey === 'dead_liability') {
            title = "Dead Animal Liability";
            let deadAmt = document.getElementById("lblDeadLiability").innerText;
            bodyContent = `
                <div class="modal-item-line"><span>Valuation Base Rate:</span><strong>Rs 80,000 / Fixed per head</strong></div>
                <div class="modal-item-line"><span>Status Criteria:</span><strong>Dead Flag Tracking Logs</strong></div>
                <div class="p-3 bg-danger text-white rounded-3 mt-3 text-center font-monospace fw-bold" style="font-size:18px;">Total Loss: Rs ${deadAmt}</div>`;
        }
        else if (itemKey === 'slaughtered_avg_rate') {
            title = "Slaughtered Average Valuation Rate";
            let avgVal = document.getElementById("lblSlaughteredAvgRate").innerText;
            bodyContent = `
                <div class="modal-item-line"><span>Calculation Path:</span><strong>Total Amount ÷ Head Count</strong></div>
                <div class="p-3 bg-success text-white rounded-3 mt-3 text-center font-monospace" style="font-size:18px;">Rs ${avgVal} / Buffalo Avg</div>`;
        }

        showModalBox(title, bodyContent);
    }

    function viewCaretakerDetail(name) {
        let filterRows = records.filter(r => r.caretaker === name);
        let title = `${name} Account Statement`;
        let totalVal = 0;
        let listHtml = `<p class="small text-secondary mb-2">Active historical ledger entries matching profile:</p>`;

        filterRows.forEach(r => {
            totalVal += r.amount;
            listHtml += `
                <div class="modal-item-line">
                    <div>
                        <strong>Tag #${r.tag}</strong> <small class="text-muted">(${r.type})</small>
                    </div>
                    <strong>Rs ${r.amount.toLocaleString()}</strong>
                </div>`;
        });

        listHtml += `
            <div class="p-3 bg-warning text-dark rounded-3 mt-3 text-center fw-bold font-monospace" style="font-size:16px;">
                Net Outstanding Balance: Rs ${totalVal.toLocaleString()}
            </div>`;

        showModalBox(title, listHtml);
    }

    function viewRowDetail(index) {
        let selectedRow = records[index];
        let title = `Transaction File: Tag #${selectedRow.tag}`;
        let content = `
            <div class="modal-item-line"><span>Assigned Caretaker:</span><strong>${selectedRow.caretaker}</strong></div>
            <div class="modal-item-line"><span>Operational Registry:</span><strong>${selectedRow.type}</strong></div>
            <div class="modal-item-line"><span>Current Livestock Status:</span><strong class="text-uppercase">${selectedRow.status}</strong></div>
            <div class="modal-item-line"><span>Financial Value:</span><strong>Rs ${selectedRow.amount.toLocaleString()}</strong></div>
            <div class="modal-item-line"><span>Calendar Date Tracked:</span><strong>${selectedRow.date}</strong></div>
            <div class="mt-4 row g-2">
                <div class="col-12">
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteRecordEntry(${index})">⚠️ PURGE ENTRY FROM SYSTEM</button>
                </div>
            </div>`;
        showModalBox(title, content);
    }

    function deleteRecordEntry(index) {
        if(confirm("Are you sure you want to delete this structural entry? System totals will re-calculate instantly.")) {
            records.splice(index, 1);
            localStorage.setItem("halimaMasterRecords", JSON.stringify(records));
            closeDetailModal();
            calculateMasterEngineMetrics();
        }
    }
</script>
